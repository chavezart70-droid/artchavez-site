<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Homepage Trust Badge Preview</title>
<style>
  :root {
    --navy: #0F172A;
    --gold: #C9A34E;
    --warm-white: #F7F5EF;
    --soft-white: #FBFAF6;
    --muted: #5B6473;
    --shadow: 0 10px 26px rgba(15, 23, 42, 0.14);
  }

  body {
    margin: 0;
    font-family: Inter, Arial, sans-serif;
    background: var(--warm-white);
    color: var(--navy);
  }

  .preview-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 18px;
  }

  .hero-image-mock {
    width: min(420px, 92vw);
    height: 560px;
    background:
      linear-gradient(to bottom, rgba(15,23,42,0.10), rgba(15,23,42,0.50)),
      radial-gradient(circle at center top, #3b465c, #111827 72%);
    border-radius: 22px;
    position: relative;
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    overflow: hidden;
  }

  .image-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.35);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
    padding: 20px;
  }

  .trust-badge {
    position: absolute;
    right: 18px;
    bottom: 32px;
    width: 176px;
    background: var(--soft-white);
    border-radius: 14px;
    box-shadow: var(--shadow);
    text-align: center;
    padding: 13px 14px 14px;
    border: 1px solid rgba(15, 23, 42, 0.07);
  }

  .trust-badge::before {
    content: "";
    position: absolute;
    left: 18px;
    right: 18px;
    top: 0;
    height: 3px;
    background: var(--gold);
    border-radius: 0 0 3px 3px;
  }

  .trust-badge .primary {
    font-family: Manrope, Inter, Arial, sans-serif;
    font-size: 0.96rem;
    line-height: 1.1;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: 0.01em;
    margin-top: 3px;
  }

  .trust-badge .secondary {
    margin-top: 5px;
    font-size: 0.74rem;
    line-height: 1.25;
    font-weight: 600;
    color: var(--muted);
  }

  @media (max-width: 520px) {
    .hero-image-mock { height: 500px; }
    .trust-badge {
      width: 158px;
      right: 14px;
      bottom: 24px;
      padding: 12px 12px 13px;
    }
    .trust-badge .primary { font-size: 0.9rem; }
    .trust-badge .secondary { font-size: 0.7rem; }
  }
</style>
</head>
<body>
  <div class="preview-wrap">
    <div class="hero-image-mock">
      <div class="image-label">Hero Image Area</div>
      <div class="trust-badge">
        <div class="primary">Since 2004</div>
        <div class="secondary">Hundreds of Oregon Families Helped</div>
      </div>
    </div>
  </div>
</body>
</html>
